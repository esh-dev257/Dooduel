<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Background circle -->
  <circle cx="32" cy="32" r="30" fill="#0f0e17" stroke="#e94560" stroke-width="3"/>
  <!-- Left pencil (tilted) -->
  <g transform="rotate(-30 32 32)">
    <rect x="18" y="12" width="8" height="36" rx="1" fill="#e94560"/>
    <polygon points="18,48 26,48 22,56" fill="#f5c542"/>
    <rect x="18" y="12" width="8" height="6" rx="1" fill="#f5c542"/>
  </g>
  <!-- Right pencil (tilted) -->
  <g transform="rotate(30 32 32)">
    <rect x="38" y="12" width="8" height="36" rx="1" fill="#00d4aa"/>
    <polygon points="38,48 46,48 42,56" fill="#f5c542"/>
    <rect x="38" y="12" width="8" height="6" rx="1" fill="#f5c542"/>
  </g>
</svg>
